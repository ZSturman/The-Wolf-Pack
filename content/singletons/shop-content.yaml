shopHeroTitle: DROP 001 - ACCESS
shopHeroIntro: This is more than a shirt. It's a statement.
shopHeroBody: >-
  A statement inspired by Wolf's survival story. Every purchase supports access
  to emergency veterinary care and helps build the lifeline.
purposeCards:
  - title: Expand access to emergency veterinary care
    body: >-
      Every piece supports our mission to expand access to emergency veterinary
      care.
  - title: Prevent financial euthanasia or surrender
    body: >-
      This work exists to help families keep their dogs at home when the cost
      of care creates crisis.
  - title: Keep dogs where they belong - home
    body: >-
      You're not just wearing something. You're backing something bigger.
accessHeroIntro: This is more than a shirt. It's a statement.
accessHeroBody: >-
  Wolf's story changed everything. But access to care gave him a second chance.
  And not every dog gets that.
productStoryTitle: This piece represents something bigger.
productStoryIntro: >-
  A movement to ensure families don't have to choose between their dog's life
  and the cost of care.
purchaseReasons:
  - This is more than a shirt. It's a statement.
  - >-
    Every purchase supports our mission to expand access to emergency
    veterinary care and prevent financial euthanasia.
  - Wear the mission. Be part of the movement. Back the pack.