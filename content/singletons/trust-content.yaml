promiseHeroTitle: The Promise We Keep
promiseHeroIntro: >-
  We saw what happens when money decides who lives. We refuse to accept that as
  normal.
promiseHeroBody: >-
  This is the promise we make - to every dog, every family, and every moment
  where time is running out: if a life can be saved, access should exist.
commitmentsTitle: >-
  We are building this with intention - and that means clarity in how we show
  up.
commitmentsIntro: Because survival should never depend on how fast help arrives.
commitments:
  - We act when time matters most.
  - We focus on treatable, time-sensitive cases.
  - We stand with families facing impossible decisions.
  - We build a system that is ready - not reactive.
trustFacts:
  - title: Use of Funds
    body: >-
      All funds are directed toward emergency veterinary care, including
      diagnostics, procedures and surgery, hospitalization, medications, and
      follow-up care.
  - title: Decision-Making
    body: >-
      Every case is evaluated based on medical viability, urgency, ethical
      responsibility, and available resources.
  - title: Veterinary Collaboration
    body: >-
      All care supported by the fund is provided by licensed veterinary
      professionals. We support access to care - we do not replace veterinary
      judgment.
  - title: Where We Are Now
    body: >-
      The Wolf Project is in its early stages. At this time, the Access to Care
      Lifeline is not yet fully operational, and our priority is to ensure that
      when we say yes, we can fully stand behind it.
faqTitle: Trust is not assumed. It is built.
faqIntro: The clearest questions deserve direct answers.
faqItems:
  - question: Can families apply for assistance today?
    answer: >-
      Not yet. The Access to Care Lifeline is still in Phase 1 while we build
      the funding, structure, and partnerships needed to support cases
      responsibly.
  - question: Where do donations go?
    answer: >-
      Funds are directed toward emergency veterinary care, case operations,
      partnerships, and mission-building work that helps the lifeline stay
      sustainable.
  - question: How are cases evaluated?
    answer: >-
      Cases are evaluated based on medical viability, urgency, ethical
      responsibility, veterinary guidance, and available resources.
  - question: Who provides care?
    answer: >-
      All care supported by the fund is provided by licensed veterinary
      professionals. The Wolf Project supports access to care - it does not
      replace veterinary judgment.
  - question: What does access to care mean?
    answer: >-
      It means treatment exists, but the cost of care stands between a dog and
      the treatment that could save them.
promiseCalloutTitle: >-
  We are actively building the funding, structure, and partnerships needed to
  support emergency cases responsibly and sustainably.
promiseCalloutParagraphs:
  - At this time, the Access to Care Lifeline is not yet fully operational.
  - >-
    Our priority is to ensure that when we say yes - we can fully stand behind
    it.
