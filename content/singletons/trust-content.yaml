milestones:
  - title: Build the founding support base
    status: current
    description: >-
      Grow recurring and one-time support so the first approved cases can be
      funded responsibly.
    evidenceLabel: Current focus
  - title: Formalize veterinary and rescue partnerships
    status: current
    description: >-
      Strengthen the referral and care network needed to evaluate urgent cases
      with speed and integrity.
    evidenceLabel: Current focus
  - title: Launch the first supported cases
    status: next
    description: >-
      Move from foundation-building into carefully scoped case support once the
      systems and funding are ready.
    evidenceLabel: Next phase
  - title: Publish recurring transparency updates
    status: future
    description: >-
      Share progress, allocations, and case outcomes with a regular reporting
      cadence as the lifeline grows.
    evidenceLabel: Future milestone
reportingTitle: If treatment exists, it deserves the chance.
reportingIntro: >-
  A dog's life should not depend on a wallet. Survival should not be a luxury.
reportingFramework:
  - title: What We Commit To
    body: >-
      We act when time matters most. We focus on treatable, time-sensitive
      cases. We stand with families facing impossible decisions.
  - title: What We Believe
    body: >-
      A dog's life should not depend on a wallet. Survival should not be a
      luxury. If treatment exists, it deserves the chance.
  - title: Be Part of the Promise
    body: >-
      This only works if people choose to stand in that space, because every
      family deserves the chance to say yes.
impactCtaItems:
  - This only works if people choose to stand in that space.
  - Every family deserves the chance to say yes.
  - The Wolf Project exists so more dogs can stay where they belong - at home.
transparencyHeroTitle: Trust Is Not Assumed. It Is Built.
transparencyHeroIntro: >-
