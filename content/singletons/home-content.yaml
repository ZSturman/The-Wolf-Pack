blogTitle: Latest Stories & Resources
ctaTitle: 'Because every family deserves the chance to hear: your dog can stay.'
ctaParagraphs:
  - >-
    When emergency veterinary costs stand between a dog and the treatment that
    could save them, families are often forced into devastating decisions.
  - >-
    Your support helps create access to care when it's needed most. Together,
    we can give more dogs the chance to go home.
