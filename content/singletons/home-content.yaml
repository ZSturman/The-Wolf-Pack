missionTitle: When treatment exists, families deserve the chance to say yes.
missionIntro: >-
  Our mission centers on one powerful idea: your dog can stay.
missionParagraphs:
  - >-
    The Wolf Project, an access to care lifeline, is an initiative under the
    non-profit organization SGT Canines to provide financial assistance when
    families cannot afford the upfront deposits required to move forward with
    lifesaving treatment at an emergency vet.
  - >-
    By helping families access emergency veterinary care when financial
    barriers appear, we work to keep dogs where they belong - at home with the
    people who love them.
helpTitle: A lifeline when treatment exists - but access to care does not.
helpIntro: >-
  Financial support for dogs requiring urgent veterinary treatment, help for
  families facing crisis situations, and partnerships that expand access to
  lifesaving care.
promiseTitle: Trust is not assumed. It is built.
promiseIntro: >-
  This is the promise we make - to every dog, every family, and every moment
  where time is running out.
shopTitle: DROP 001 - ACCESS
shopIntro: >-
  A statement inspired by Wolf's survival story. Every purchase supports access
  to emergency veterinary care and helps build the lifeline.
videoTitle: How one dog inspired this entire mission.
videoIntro: Meet Wolf. Given a 0-10% chance of survival.
videoBody: >-
