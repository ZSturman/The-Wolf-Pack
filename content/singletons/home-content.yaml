heroEyebrow: Access to Care Lifeline Initiative under SGT Canines
heroTitle: When Treatment Exists But Access To Care Doesn't
heroIntro: >-
  The Wolf Project helps families access emergency veterinary care so dogs can
  stay in the homes where they belong.
heroSummary: >-
  We are actively building the funding, structure, and partnerships needed to
  support emergency cases responsibly and sustainably.
storyPanelTitle: The Problem No One Talks About
storyPanelBody: >-
  As we fought for Wolf, we realized this wasn't just our story. His fight for
  survival revealed a painful reality - too many dogs are lost not because
  treatment doesn't exist, but because access to care doesn't.
