heroTitle: A lifeline when treatment exists - but access to care does not.
heroIntro: >-
  Too many dogs are lost not because treatment doesn't exist, but because
  access to care doesn't. The Wolf Project exists to stand in that space.
stepsTitle: Emergency support, family advocacy, and community impact.
stepsIntro: >-
  Financial support for dogs requiring urgent veterinary treatment, help for
  families facing crisis situations, and partnerships that expand access to
  lifesaving care.
steps:
  - title: Emergency Access to Care
    body: Financial support for dogs requiring urgent veterinary treatment.
  - title: Preventing Financial Euthanasia or Surrender
    body: >-
      Helping families keep their dogs at home when emergency veterinary costs
      create crisis situations.
  - title: Community Impact
    body: >-
      Building partnerships with veterinarians, rescues, and supporters to
      expand access to lifesaving care.
conditionsTitle: Emergency care isn't just urgent - it's expensive.
conditionsIntro: >-
  Treatment often requires at least 75% upfront payment before care can begin.
conditions:
  - title: Emergency surgery
    description: $4,000-$10,000+
    outcome: >-
      Treatment often requires at least 75% upfront payment before care can
      begin.
  - title: Bloat (GDV)
    description: $6,000-$12,000
    outcome: >-
      A life-threatening emergency where time is limited and access matters
      immediately.
  - title: Toxic ingestion
    description: $1,500-$6,000
    outcome: >-
      Urgent treatment can change everything, but only if care can begin in
      time.
  - title: Urinary blockage
    description: $2,500-$7,000
    outcome: >-
      Financial barriers can delay care even when the condition is treatable.
eligibilityTitle: Every case is evaluated with care and integrity.
eligibilityIntro: >-
  We cannot promise to fund every case. We promise to act with integrity in
  every decision.
principles:
  - We act when time matters most.
  - We focus on treatable, time-sensitive cases.
  - We stand with families facing impossible decisions.
  - We build a system that is ready - not reactive.
  - >-
    Every case is evaluated based on medical viability, urgency, ethical
    responsibility, and available resources.
  - >-
    We support access to care - we do not replace veterinary judgment.
statusTitle: We are building something that steps in before it's too late.
statusParagraphs:
  - >-
    The Wolf Project is in its early stages. We are actively building the
    funding, structure, and partnerships needed to support emergency cases
    responsibly and sustainably.
  - >-
    At this time, the Access to Care Lifeline is not yet fully operational.
    Our priority is to ensure that when we say yes - we can fully stand behind
    it.
